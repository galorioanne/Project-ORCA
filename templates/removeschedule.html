<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Caro · Remove schedule</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
  </head>
  <body class="m-5">
    <a class=" mt-3 ps-5 icon-link return-pad" href="{{ url_for('index') }}">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left-short" viewBox="0 0 16 16">
  <path fill-rule="evenodd" d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5"/>
</svg>
                Return
      </a>
    <h1 class="text-center">Remove Schedule</h1>
        <div class="card w-50 mx-auto">
        <form class="card-body" action="{{ url_for('removeschedule_') }}" method="post">
            <label for="name">Schedule Name:</label><br>

            <div class="input-group mb-3">
            <select name="name" id="name" class="form-control form-select w-50" required>
                {% for schedule in data %}
                    <option value="{{ schedule.name }}">{{ schedule.name }}</option>
                {% endfor %}
            </select>
            <input type="submit" value="Remove schedule" class="form-control btn-caro-tertiary">
            </div>
        </form> 

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
