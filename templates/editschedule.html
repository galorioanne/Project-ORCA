<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editing {{ schedule.name }} | Project CARO</title>
  <link rel="stylesheet" href="{{ url_for('static', filename=('css/theme-'+settings["theme"]+'.css')) }}">
</head>

<body class=" caro-bg">
  {% include 'navbar.html' %}
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const fadeDiv = document.getElementById('content-area');
      const links = document.querySelectorAll('a');

      links.forEach(link => {
        link.addEventListener('click', (e) => {
          // Only apply to internal links
          if (link.hostname === window.location.hostname) {
            e.preventDefault();
            const targetUrl = link.href;

            // Add the fade-out class
            fadeDiv.classList.add('fade-out');

            // Wait for the animation to finish (match CSS duration)
            setTimeout(() => {
              window.location.href = targetUrl;
            }, 500);
          }
        });
      });
    });
  </script>
  <div class="m-5 fade-target" id="content-area">
    <a class=" mt-3 ps-5 icon-link return-pad" href="{{ url_for('viewschedules') }}">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left-short"
        viewBox="0 0 16 16">
        <path fill-rule="evenodd"
          d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5" />
      </svg>
      Return
    </a>
    <h1 class="text-center">Editing Schedule</h1>
    <div class="card w-50 mx-auto">

      <form class="card-body bg-caro-card" action="{{ url_for('editschedule_', schedule_name=schedule.name) }}"
        method="post">
        {% if not message == "" or message == None %}
        <div class="alert alert-danger" role="alert">
          {{ message }}
        </div>
        {% endif %}
        <p class="form-label text-pre">Schedule Name:</p>
        <input type="text" id="name" name="name" class="form-control w-100 caro-form"
          placeholder="Schedule name here..." value="{{ schedule.name }}" required>
        <p class="form-label text-pre mt-3">Start time: End time:</p>
        <div class="input-group mb-3">
          <input id="start_time" name="start_time" class="form-control w-50 caro-form" type="datetime-local"
            value="{{ schedule.start_time.strftime('%Y-%m-%dT%H:%M') }}" required />
          <input id="end_time" name="end_time" class="form-control w-50 caro-form" type="datetime-local"
            value="{{ schedule.end_time.strftime('%Y-%m-%dT%H:%M') }}" required />
        </div>
        <label for="exampleFormControlTextarea1" class="form-label">Description:</label>
        <textarea class="form-control caro-form" id="description" name="description"
          rows="4">{{ schedule.description }}</textarea>
        <input type="submit" value="Update Schedule" class="btn btn-caro-primary mt-2">
    </div>
  </div>
  </form>
  <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
