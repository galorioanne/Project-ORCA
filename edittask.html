<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Edit Task</title>
    </head>
    <body>
        <a href="{{ url_for('index') }}">&lt; Go Back</a>
        <h2>Edit Task</h2>
        <form action="{{ url_for('edittask_', task_name=task.name) }}" method="post">
            <label for="name">Task Name:</label><br>
            <input type="text" id="name" name="name" value="{{ task.name }}" required><br><br>
            <label for="datetime">Due Date & Time:</label><br>
            <input type="datetime-local" id="datetime" name="datetime" value="{{ task.datetime.strftime('%Y-%m-%dT%H:%M') }}" required><br><br>
            <label for="description">Description:</label><br>
            <textarea id="description" name="description" rows="4" cols="50">{{ task.description }}</textarea><br><br>
            <label for="status">Mark complete?</label><br>
            <input type="checkbox" id="status" name="status" {% if task.status %}checked{% endif %}><br><br>
            <input type="submit" value="Update Task">
    </body>
